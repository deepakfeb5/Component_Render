<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Component BOM</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body { background: #eef2f3; }
        .card { margin-top: 40px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center mt-4">Dynamic Component BOM (Flask)</h1>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped" id="bomTable">
                <thead>
                <tr>
                    <th>Component</th>
                    <th>Part Number</th>
                    <th>Quantity</th>
                    <th>Live Price</th>
                </tr>
                </thead>
                <tbody id="bomBody"></tbody>
            </table>

            <h5>Add New Component</h5>

            <div class="row g-3">
                <div class="col-md-4">
                    <input id="compName" class="form-control" placeholder="Component">
                </div>
                <div class="col-md-4">
                    <input id="partNumber" class="form-control" placeholder="Part Number">
                </div>
                <div class="col-md-2">
                    <input id="qty" type="number" class="form-control" placeholder="Qty">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="addComponent()">Add</button>
                </div>
            </div>

            <button class="btn btn-success mt-4" onclick="exportCSV()">Export CSV</button>

        </div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
